[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --cov-config=.coveragerc
markers =
    unit: fast, isolated unit tests
    integration: tests that hit AWS services (via moto)
    slow: tests that are slow (skipped by default in CI quick mode)
filterwarnings =
    ignore::DeprecationWarning
